<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>
  <title>Namerama</title>

  <!-- Self-contained styling: no external CDN, so the page renders identically
       even in network-restricted environments (e.g. the proposal-check runner)
       with zero failed-resource console errors. -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 1.5rem;
      padding: 1.5rem;
      background: #09090b;
      color: #f4f4f5;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .header { text-align: center; margin-top: 1rem; }
    .header h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
    .subtitle { font-size: 0.875rem; color: #71717a; margin: 0.25rem 0 0; }

    #generate-btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 0.75rem;
      background: #7c3aed;
      color: #fff;
      font-size: 1.125rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.3);
      transition: background 0.15s ease, transform 0.05s ease;
    }
    #generate-btn:hover { background: #8b5cf6; }
    #generate-btn:active { transform: scale(0.95); }
    #generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    #status { font-size: 0.875rem; color: #a1a1aa; min-height: 1.25rem; text-align: center; }

    #result {
      width: 100%;
      max-width: 28rem;
      border: 1px solid #27272a;
      border-radius: 1rem;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      background: #18181b;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    #logo { width: 8rem; height: 8rem; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #logo svg { width: 100%; height: 100%; }
    #logo.mono { font-size: 2.25rem; font-weight: 900; }
    .brand-block { text-align: center; }
    #brand-name { font-size: 1.875rem; font-weight: 800; letter-spacing: -0.025em; margin: 0; overflow-wrap: anywhere; }
    #brand-tagline { font-size: 0.875rem; opacity: 0.8; margin: 0.25rem 0 0; }
    #swatches { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
    .swatch { width: 2rem; height: 2rem; border-radius: 9999px; border: 1px solid rgba(255,255,255,0.2); display: inline-block; }
    #pitch { font-size: 0.875rem; line-height: 1.6; align-self: stretch; }
    #pitch p { margin: 0 0 0.75rem; }
    #pitch p:last-child { margin-bottom: 0; }
    #demo-note { font-size: 0.75rem; color: rgba(251, 191, 36, 0.8); text-align: center; margin: 0; }
    .hidden { display: none !important; }
  </style>

  <script src="https://social-vibecoding.usernodelabs.org/usernode-bridge/v1/bridge.js"></script>
</head>
<body>
  <header class="header">
    <h1>Namerama</h1>
    <p class="subtitle">One click. One ridiculously perfect brand.</p>
  </header>

  <button id="generate-btn">Generate branding ✨</button>

  <div id="status"></div>

  <!-- Result card; re-tinted to the generated palette on each generation. -->
  <section id="result" class="hidden">
    <div id="logo"></div>
    <div class="brand-block">
      <h2 id="brand-name"></h2>
      <p id="brand-tagline"></p>
    </div>
    <div id="swatches"></div>
    <div id="pitch"></div>
    <p id="demo-note" class="hidden"></p>
  </section>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const headers = token ? { 'x-usernode-token': token } : {};

    const btn = document.getElementById('generate-btn');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    function setStatus(msg) { statusEl.textContent = msg || ''; }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ));
    }

    // Minimal, escaped markdown: handles **bold**, *italic*, and paragraphs.
    function renderPitch(text) {
      const paras = String(text).split(/\n{2,}/).map((p) => p.trim()).filter(Boolean);
      return paras.map((p) => {
        let html = escapeHtml(p)
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/\n/g, '<br>');
        return '<p>' + html + '</p>';
      }).join('');
    }

    // Sanitize untrusted model SVG before inserting it into the DOM:
    // require an <svg> root, drop <script>/<foreignObject>, strip on* event
    // handlers and any off-document href/xlink:href.
    function sanitizeSvg(raw) {
      if (typeof raw !== 'string' || !/<svg[\s>]/i.test(raw)) return null;
      let doc;
      try { doc = new DOMParser().parseFromString(raw, 'image/svg+xml'); }
      catch { return null; }
      const svg = doc.querySelector('svg');
      if (!svg || doc.querySelector('parsererror')) return null;
      svg.querySelectorAll('script, foreignObject').forEach((n) => n.remove());
      doc.querySelectorAll('*').forEach((el) => {
        for (const attr of Array.from(el.attributes)) {
          const name = attr.name.toLowerCase();
          const val = attr.value.trim();
          if (name.startsWith('on')) { el.removeAttribute(attr.name); continue; }
          if ((name === 'href' || name === 'xlink:href') && !val.startsWith('#')) {
            el.removeAttribute(attr.name);
          }
        }
      });
      svg.setAttribute('width', '100%');
      svg.setAttribute('height', '100%');
      return svg.outerHTML;
    }

    function render(b) {
      const colors = Array.isArray(b.colors) && b.colors.length ? b.colors : ['#7c3aed', '#22d3ee', '#f8fafc'];
      const bg = colors.find((c) => c.toLowerCase() !== '#ffffff') || '#18181b';
      const accent = colors[0];
      const text = colors[colors.length - 1] || '#f8fafc';

      resultEl.style.background = bg;
      resultEl.style.borderColor = accent;
      resultEl.style.color = text;

      const logoEl = document.getElementById('logo');
      const safeSvg = sanitizeSvg(b.logoSvg);
      if (safeSvg) {
        logoEl.innerHTML = safeSvg;
        logoEl.classList.remove('mono');
        logoEl.style.color = '';
      } else {
        logoEl.textContent = (b.name || '?').slice(0, 2).toUpperCase();
        logoEl.classList.add('mono');
        logoEl.style.color = accent;
      }

      const nameEl = document.getElementById('brand-name');
      nameEl.textContent = b.name || 'Untitled';
      nameEl.style.color = accent;

      const tagEl = document.getElementById('brand-tagline');
      tagEl.textContent = b.tagline || '';
      tagEl.style.display = b.tagline ? '' : 'none';

      document.getElementById('swatches').innerHTML = colors.map((c) =>
        '<span class="swatch" title="' + escapeHtml(c) + '" style="background:' + escapeHtml(c) + '"></span>'
      ).join('');

      document.getElementById('pitch').innerHTML = renderPitch(b.pitch || '');

      const demoNote = document.getElementById('demo-note');
      if (b.demo) {
        demoNote.textContent = 'Demo branding — live AI is off in this preview.';
        demoNote.classList.remove('hidden');
      } else {
        demoNote.classList.add('hidden');
      }

      resultEl.classList.remove('hidden');
    }

    async function callGenerate() {
      return fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...headers },
      });
    }

    async function generate() {
      btn.disabled = true;
      setStatus('Cooking up something iconic…');
      try {
        let res = await callGenerate();

        // First-use / revoked consent: ask the platform for access, then retry once.
        // window.usernode comes from the hosted bridge; guard in case it isn't loaded.
        if (res.status === 403) {
          setStatus('Namerama needs AI access to generate branding…');
          try {
            const r = window.usernode && window.usernode.requestLlmAccess
              ? await window.usernode.requestLlmAccess()
              : null;
            if (r && r.granted) {
              setStatus('Cooking up something iconic…');
              res = await callGenerate();
            } else {
              setStatus('Namerama needs AI access to generate branding — tap Generate to allow.');
              return;
            }
          } catch {
            setStatus('Namerama needs AI access to generate branding — tap Generate to allow.');
            return;
          }
        }

        if (res.status === 429) {
          let code = '';
          try { code = (await res.json()).code; } catch {}
          setStatus(code === 'budget_exceeded'
            ? "You've hit today's overall AI budget — resets at midnight UTC."
            : "Namerama has hit today's AI limit — try again tomorrow.");
          return;
        }

        if (!res.ok) {
          setStatus('The branding machine is jammed. Give it another tap.');
          return;
        }

        const branding = await res.json();
        render(branding);
        setStatus('');
      } catch (err) {
        console.error(err);
        setStatus('The branding machine is jammed. Give it another tap.');
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', generate);
  </script>
</body>
</html>
